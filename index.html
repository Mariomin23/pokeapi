<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css">
    <title>Poké-Visualizador Pro</title>
    <style>
      /* Estilos de fondo y tipografía */
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(
          135deg,
          #ff1c1c 0%,
          #ff0000 50%,
          #333 50%,
          #000 100%
        );
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #333;
      }

      /* Contenedor principal (La Tarjeta) */
      .pokemon-card {
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        text-align: center;
        width: 300px;
        border: 8px solid #333;
        position: relative;
      }

      /* Título del Pokémon */
      #pokemon-name {
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 20px;
        color: #222;
        font-size: 1.5rem;
        border-bottom: 2px solid #eee;
        padding-bottom: 10px;
      }

      /* Contenedor de la imagen */
      .img-wrapper {
        background: #f0f0f0;
        border-radius: 15px;
        padding: 20px;
        display: inline-block;
        transition: all 0.3s ease;
      }

      /* La imagen con tamaño razonable */
      #pokemon-img {
        width: 180px;
        height: 180px;
        filter: drop-shadow(5px 5px 5px #aaa);
      }

      /* Un pequeño detalle decorativo abajo */
      .card-footer {
        margin-top: 20px;
        font-size: 0.8rem;
        color: #888;
        font-weight: bold;
      }

      /* Animación suave cuando cambia la imagen */
      .fade-in {
        animation: fadeIn 0.5s;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="pokemon-card">
      <h2 id="pokemon-name">Buscando...</h2>
      <div class="img-wrapper" id="img-container">
        <img id="pokemon-img" src="" alt="Cargando..." />
      </div>
      <div class="card-footer">POKÉ-MODULAR v3.0</div>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
